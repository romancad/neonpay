<svg width="220" height="60" viewBox="0 0 220 60" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .pink { fill: #ff6b9a; }
      .text-small { fill: rgba(255, 255, 255, 0.6); font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.15em; text-transform: lowercase; }
      .text-main { fill: #ff6b9a; font-family: 'Outfit', sans-serif; font-weight: 800; font-size: 32px; letter-spacing: -0.02em; }
    </style>
  </defs>
  
  <!-- Icon -->
  <g transform="translate(30, 30)">
    <!-- Three Hexagons arranged in a triangle -->
    <!-- Top Hexagon -->
    <path d="M0,-14 L12.12,-7 L12.12,7 L0,14 L-12.12,7 L-12.12,-7 Z" class="pink" transform="translate(0, -11)"/>
    <!-- Bottom Left Hexagon -->
    <path d="M0,-14 L12.12,-7 L12.12,7 L0,14 L-12.12,7 L-12.12,-7 Z" class="pink" transform="translate(-10.5, 8.5)"/>
    <!-- Bottom Right Hexagon -->
    <path d="M0,-14 L12.12,-7 L12.12,7 L0,14 L-12.12,7 L-12.12,-7 Z" class="pink" transform="translate(10.5, 8.5)"/>
    
    <!-- Central White Y-Logo (Star) -->
    <path d="M0,0 L0,-5 M0,0 L4.33,2.5 M0,0 L-4.33,2.5" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
  </g>

  <!-- Text Content -->
  <text x="75" y="20" class="text-small">crypto-exchange</text>
  <text x="75" y="48" class="text-main">TALAPS</text>
</svg>
